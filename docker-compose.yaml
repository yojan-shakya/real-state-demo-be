services:
  pg:
    image: postgres
    env_file:
      - ./.env.docker
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - './.env.docker'
    ports:
      - '3000:3000'
    depends_on:
      pg:
        condition: service_healthy
    restart: on-failure
